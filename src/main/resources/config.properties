# =============================================================================
# Framework Configuration Properties
# All runtime settings are centralised here so tests never contain hard-coded
# values. Change a value once here and it applies across the entire suite.
# =============================================================================


# -----------------------------------------------------------------------------
# Browser Settings
# -----------------------------------------------------------------------------

# Controls which browser WebDriver launches. Accepted values: chrome, firefox, edge.
browser=chrome


# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------

# Selects the active target environment. The framework uses this key to resolve
# the correct base URL from the url.* entries below. Accepted values: qa, staging.
env=qa


# -----------------------------------------------------------------------------
# Application URLs
# -----------------------------------------------------------------------------

# Base URL for the QA environment. Loaded when env=qa.
url.qa=https://www.automationexercise.com

# Base URL for the Staging environment. Loaded when env=staging.
url.staging=https://staging.automationexercise.com


# -----------------------------------------------------------------------------
# Wait Times
# -----------------------------------------------------------------------------

# Number of seconds WebDriver will poll the DOM for an element before throwing
# NoSuchElementException. Applied once at driver creation via driver.manage().timeouts().
implicit.wait=10

# Maximum number of seconds an ExplicitWait / FluentWait will wait for a
# condition to become true before throwing TimeoutException.
explicit.wait=20


# -----------------------------------------------------------------------------
# Selenium Grid
# -----------------------------------------------------------------------------

# RemoteWebDriver hub endpoint used when tests are executed on Selenium Grid.
# Only active when the framework is configured to run in remote/grid mode.
grid.url=http://localhost:4444/wd/hub


# -----------------------------------------------------------------------------
# Reports
# -----------------------------------------------------------------------------

# Relative path (from project root) where the ExtentReports HTML file is written
# after each test run. The reports/ folder is git-ignored to avoid binary bloat.
report.path=reports/extent-report.html


# -----------------------------------------------------------------------------
# Logs
# -----------------------------------------------------------------------------

# Relative path (from project root) where Log4j writes the rolling framework log.
# Centralising this here lets CI pipelines archive the file without touching code.
log.path=logs/framework.log


# -----------------------------------------------------------------------------
# Test Data
# -----------------------------------------------------------------------------

# Relative path to the Excel workbook used by Apache POI for data-driven tests.
# Keeping it in test/resources ensures Maven packages it on the test classpath.
testdata.path=src/test/resources/testdata/testdata.xlsx
